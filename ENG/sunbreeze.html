/* === 🌍 STYLE GLOBAL POUR BLOCS DE PROJET === */

.project-section {
  display: flex;

  border-radius: 10px;
  font-family: "Droid Sans", sans-serif;

.left-column,

.video-container-presentation {
  position: relative;
  width: 100%;

}

.video-container-presentation iframe {

  height: 100%;
  border: 0;

}

/* 🧾 Bloc infos projet */
.project-info {
  background-color: #2e304d;
  padding: 16px;
  border-radius: 8px;
  font-size: 25px;
  color: #dcdef8;
  line-height: 35px;
  text-align: left;
}

/* 📋 Colonne droite (tâches & outils) */
.right-column {
  background-color: #2e304d;
  padding: 20px;
  border-radius: 10px;
}

.task-title {

  color: #e94e50;

  margin-top: 20px;
  text-align: left;
}

.task-title.tools {
  margin-top: 40px;
}

.task-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

/* ✏️ Élément de liste (tâche) */
.task-item {
  display: flex;
  align-items: flex-start;
  margin-bottom: 17px;
  margin-left: 15px;
  font-size: 25px;
  color: #dcdef8;
  line-height: 1.4;
  text-align: left;
}

.task-item.lineBreakUp { margin-top: 30px; }
.task-item.lineBreak { margin-left: 30px; }
.task-item.lineBreakDown { margin-bottom: 30px; margin-left: 30px; }

/* 📖 Description du projet (sous les colonnes) */
.project-description {
  margin-top: 40px;
  max-width: 1000px;
  margin-left: auto;
  margin-right: auto;
  text-align: center;
  font-size: 20px;
  color: #dcdef8;
  line-height: 1.5;

    width: 100%;

  }

/* --- 📱 PETITS TÉLÉPHONES (max 480px, ex : 320px) --- */

    margin-bottom: 8px; /* <-- Ajuste ici l’espacement pour très petits écrans */
  }

  .project-info {
    font-size: 18px;
    line-height: 26px;
  }

  .project-description {
    font-size: 16px;
  }
}
